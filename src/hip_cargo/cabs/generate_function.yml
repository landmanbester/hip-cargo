cabs:
  generate_function:
    flavour: python
    command: hip_cargo.core.generate_function.generate_function
    name: generate_function
    info:
      Generate Python function from Stimela cab definition.
    image: ghcr.io/landmanbester/hip-cargo:tbumpallowrcapost
    inputs:
      cab-file:
        info:
          Path to Stimela cab YAML file.
        dtype: File
        required: true
        policies:
          positional: true
        metadata:
          rich_help_panel: Inputs
      config-file:
        info:
          Optional path to ruff config file to use when generating function.
        dtype: Optional[File]
        metadata:
          rich_help_panel: Inputs
    outputs:
      output-file:
        dtype: File
        info:
          Name of output CLI function.
        required: true
        policies:
          positional: true
        metadata:
          rich_help_panel: Outputs
