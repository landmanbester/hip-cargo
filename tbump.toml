# tbump configuration for hip-cargo
# See https://github.com/your-tools/tbump for usage

[version]
current = "0.1.5"

# Version format: use semantic versioning
regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  '''

[git]
message_template = "Bump version to {new_version}"
tag_template = "v{new_version}"

# Hooks to update generated files with new version before committing
[[before_push]]
name = "Write release version sentinel for cab generation"
cmd = "python -c \"from pathlib import Path; Path('.tbump_version').write_text('{new_version}')\""

[[before_push]]
name = "Regenerate cab definitions with new version"
cmd = "hip-cargo generate-cabs --module 'src/hip_cargo/cli/*.py' --output-dir src/hip_cargo/cabs"

# Files to update with the new version
[[file]]
src = "pyproject.toml"
search = 'version = "{current_version}"'

[[file]]
src = "src/hip_cargo/__init__.py"
search = '__version__ = "{current_version}"'

[[before_commit]]
name = "Update uv.lock"
cmd = "uv lock"

[[before_commit]]
name = "Stage uv.lock"
cmd = "git add uv.lock"
